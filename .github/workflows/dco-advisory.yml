name: DCO Sign-off Advisory

on:
  workflow_call:
    inputs:
      app_client_id:
        description: GitHub App client ID used to mint the DCO advisory token.
        required: true
        type: string
      pr_number:
        description: Pull request number to inspect.
        required: true
        type: number
      head_sha:
        description: Expected current pull request head SHA.
        required: true
        type: string
    secrets:
      app_private_key:
        description: Private key for the installed Steward GitHub App.
        required: true
    outputs:
      state:
        description: DCO advisory operation state.
        value: ${{ jobs.dco.outputs.state }}
      operation_result:
        description: Serialized DCO advisory operation result.
        value: ${{ jobs.dco.outputs.operation_result }}

concurrency:
  group: steward-dco-${{ github.repository_id }}-${{ inputs.pr_number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dco:
    name: DCO Sign-off Advisory
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      state: ${{ steps.steward.outputs.state }}
      operation_result: ${{ steps.steward.outputs['operation-result'] }}
    steps:
      - name: Create DCO advisory token
        id: platform_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ inputs.app_client_id }}
          private-key: ${{ secrets.app_private_key }}
          permission-contents: read
          permission-issues: write
          permission-pull-requests: read

      - name: Evaluate DCO sign-offs
        id: steward
        uses: splrad/steward/action@00820057afd9f74600a5184f24f4aa4d96e3db3f
        with:
          operation: dco-advisory
          github-token: ${{ steps.platform_token.outputs.token }}
          pr-number: ${{ inputs.pr_number }}
          head-sha: ${{ inputs.head_sha }}
