name: PR Validation Matrix

on:
  workflow_call:
    inputs:
      app_client_id:
        description: GitHub App client ID used to mint the Matrix platform token.
        required: true
        type: string
      pr_number:
        description: Pull request number for a manual dispatch; trusted native events may derive it from the payload or run-name.
        required: false
        default: 0
        type: number
      head_sha:
        description: Expected current pull request head SHA for a manual dispatch; trusted native events derive it from the payload or run-name.
        required: false
        default: ''
        type: string
      scope:
        description: auto, full, or gate-only.
        required: false
        default: auto
        type: string
      mode:
        description: observe, repair, or enforce.
        required: false
        default: enforce
        type: string
    secrets:
      app_private_key:
        description: Private key for the installed Steward GitHub App.
        required: true
    outputs:
      state:
        description: Matrix operation state.
        value: ${{ jobs.matrix.outputs.state }}
      operation_result:
        description: Serialized Matrix operation result.
        value: ${{ jobs.matrix.outputs.operation_result }}

concurrency:
  group: >-
    steward-matrix-${{ github.repository_id }}-${{
      github.event.pull_request.number
      || github.event.client_payload.pr_number
      || github.event.check_run.pull_requests[0].number
      || ((startsWith(github.event.workflow_run.display_title, 'PR Validation Target #')
        || startsWith(github.event.workflow_run.display_title, 'PR Review Signal #'))
        && github.event.workflow_run.display_title)
      || (startsWith(github.event.workflow_run.name, 'PR Validation Target #')
        && github.event.workflow_run.name)
      || github.event.workflow_run.pull_requests[0].number
      || inputs.pr_number
      || github.run_id
    }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  matrix:
    name: Evaluate PR Validation Matrix
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      state: ${{ steps.steward.outputs.state }}
      operation_result: ${{ steps.steward.outputs['operation-result'] }}
    steps:
      - name: Create Matrix platform token
        id: platform_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ inputs.app_client_id }}
          private-key: ${{ secrets.app_private_key }}
          permission-actions: write
          permission-checks: write
          permission-contents: read
          permission-pull-requests: read

      - name: Evaluate and converge PR validation matrix
        id: steward
        uses: splrad/steward/action@00820057afd9f74600a5184f24f4aa4d96e3db3f
        with:
          operation: matrix
          github-token: ${{ steps.platform_token.outputs.token }}
          pr-number: ${{ inputs.pr_number }}
          head-sha: ${{ inputs.head_sha }}
          matrix-mode: ${{ inputs.mode }}
          matrix-scope: ${{ inputs.scope }}
