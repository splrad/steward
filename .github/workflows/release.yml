name: Release

on:
  workflow_call:
    inputs:
      app_client_id:
        description: GitHub App client ID used to mint repository-scoped Release tokens.
        required: true
        type: string
      pr_number:
        description: Merged pull request number for workflow_dispatch recovery.
        required: false
        default: 0
        type: number
    secrets:
      app_private_key:
        description: Private key for the installed Steward GitHub App.
        required: true
    outputs:
      state:
        description: Release publication state when publication runs.
        value: ${{ jobs.release.outputs.state }}
      release_url:
        description: Published Release URL when available.
        value: ${{ jobs.release.outputs.release_url }}

concurrency:
  group: steward-release-${{ github.repository_id }}-${{ github.event.pull_request.number || inputs.pr_number || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  preflight:
    name: Validate Release Candidate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      release_needed: ${{ steps.steward.outputs['release-needed'] }}
      release_context: ${{ steps.steward.outputs['release-context'] }}
      release_runner: ${{ steps.steward.outputs['release-runner'] }}
      adapter_command: ${{ steps.steward.outputs['release-adapter-command'] }}
    steps:
      - name: Create Release preflight token
        id: platform_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ inputs.app_client_id }}
          private-key: ${{ secrets.app_private_key }}
          permission-checks: write
          permission-contents: read
          permission-pull-requests: read

      - name: Validate merged Release candidate
        id: steward
        continue-on-error: true
        uses: splrad/steward/action@7ecd713690942cd1104deb219e8e4cd2e3f9cff8
        with:
          operation: release-preflight
          github-token: ${{ steps.platform_token.outputs.token }}
          pr-number: ${{ inputs.pr_number }}

      - name: Finalize Release preflight failure
        if: ${{ steps.steward.outcome == 'failure' }}
        uses: splrad/steward/action@7ecd713690942cd1104deb219e8e4cd2e3f9cff8
        with:
          operation: release-finalize
          github-token: ${{ steps.platform_token.outputs.token }}
          pr-number: ${{ inputs.pr_number }}
          release-failure-summary: Release preflight failed before adapter execution.

  release:
    name: Build and Publish Release
    needs: preflight
    if: ${{ needs.preflight.outputs.release_needed == 'true' }}
    runs-on: ${{ needs.preflight.outputs.release_runner }}
    timeout-minutes: 60
    outputs:
      state: ${{ steps.publish.outputs.state || steps.status.outputs.state }}
      release_url: ${{ steps.publish.outputs['release-url'] }}
    steps:
      - name: Create Release publication token
        id: platform_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ inputs.app_client_id }}
          private-key: ${{ secrets.app_private_key }}
          permission-checks: write
          permission-contents: write
          permission-pull-requests: read

      - name: Check out merged source
        id: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ fromJSON(needs.preflight.outputs.release_context).pullRequest.mergeSha }}
          persist-credentials: false

      - name: Plan Release
        id: plan
        uses: splrad/steward/action@7ecd713690942cd1104deb219e8e4cd2e3f9cff8
        with:
          operation: release-adapter
          release-adapter-phase: plan
          release-adapter-command: ${{ needs.preflight.outputs.adapter_command }}
          release-context: ${{ needs.preflight.outputs.release_context }}

      - name: Check existing publication state
        id: status
        uses: splrad/steward/action@7ecd713690942cd1104deb219e8e4cd2e3f9cff8
        with:
          operation: release-status
          github-token: ${{ steps.platform_token.outputs.token }}
          release-context: ${{ needs.preflight.outputs.release_context }}
          release-plan: ${{ steps.plan.outputs['release-plan'] }}

      - name: Build Release assets
        id: build
        if: ${{ steps.status.outputs['release-build-needed'] == 'true' }}
        uses: splrad/steward/action@7ecd713690942cd1104deb219e8e4cd2e3f9cff8
        with:
          operation: release-adapter
          release-adapter-phase: build
          release-adapter-command: ${{ needs.preflight.outputs.adapter_command }}
          release-context: ${{ needs.preflight.outputs.release_context }}

      - name: Publish Release
        id: publish
        if: ${{ steps.status.outputs['release-build-needed'] == 'true' }}
        uses: splrad/steward/action@7ecd713690942cd1104deb219e8e4cd2e3f9cff8
        with:
          operation: release-publish
          github-token: ${{ steps.platform_token.outputs.token }}
          release-context: ${{ needs.preflight.outputs.release_context }}
          release-plan: ${{ steps.plan.outputs['release-plan'] }}
          release-assets: ${{ steps.build.outputs['release-assets'] }}
          release-output-directory: ${{ steps.build.outputs['release-output-directory'] }}

      - name: Finalize pre-publication failure
        if: >-
          ${{ always() && (
            steps.checkout.outcome == 'failure' ||
            steps.plan.outcome == 'failure' ||
            steps.status.outcome == 'failure' ||
            steps.build.outcome == 'failure'
          ) }}
        uses: splrad/steward/action@7ecd713690942cd1104deb219e8e4cd2e3f9cff8
        with:
          operation: release-finalize
          github-token: ${{ steps.platform_token.outputs.token }}
          release-context: ${{ needs.preflight.outputs.release_context }}
          release-failure-summary: Release workflow failed before publication could complete.
