name: Steward CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify source and generated artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Type-check source
        run: npm run typecheck

      - name: Verify generated Action
        run: npm run verify:dist

      - name: Verify workflow policy
        run: npm run verify:workflows

      - name: Validate workflow syntax
        shell: bash
        run: |
          set -euo pipefail
          version=1.7.12
          archive="actionlint_${version}_linux_amd64.tar.gz"
          checksums="actionlint_${version}_checksums.txt"
          curl --fail --location --remote-name "https://github.com/rhysd/actionlint/releases/download/v${version}/${archive}"
          curl --fail --location --remote-name "https://github.com/rhysd/actionlint/releases/download/v${version}/${checksums}"
          grep " ${archive}$" "${checksums}" | sha256sum --check --strict
          tar --extract --gzip --file "${archive}" actionlint
          ./actionlint .github/workflows/*.yml templates/thin-workflows/*.yml

      - name: Check whitespace
        run: git diff --check
