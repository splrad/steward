name: SPLRAD Steward
description: Run a versioned SPLRAD Steward operation.
author: SPLRAD
inputs:
  operation:
    description: Steward operation to execute.
    required: true
  github-token:
    description: Platform token used to validate repository context and read the default-branch Manifest. Required for every operation except version.
    required: false
  mutation-token:
    description: Separate human token required only by governance-request-copilot and governance-auto-approve.
    required: false
  event-path:
    description: Path to the trusted GitHub event payload. Defaults to GITHUB_EVENT_PATH.
    required: false
  pr-number:
    description: Pull request number for a manual dispatch when the event has no native PR association.
    required: false
  head-sha:
    description: Expected current PR head SHA for a manual dispatch or relay signal.
    required: false
  request-result:
    description: Result of the Copilot review request job for governance-copilot.
    required: false
  matrix-mode:
    description: Matrix behavior: observe, repair, or enforce.
    required: false
    default: enforce
  matrix-scope:
    description: Matrix target scope: auto, full, or gate-only.
    required: false
    default: auto
outputs:
  steward-version:
    description: Version of the bundled Steward Action.
  state:
    description: passed, pending, failed, or ignored operation state.
  operation-result:
    description: JSON result for step summaries and workflow orchestration.
  governance-enabled:
    description: Whether default-branch Manifest governance is enabled.
  copilot-review-enabled:
    description: Whether default-branch Manifest Copilot review is enabled.
runs:
  using: node24
  main: dist/index.js
branding:
  icon: shield
  color: blue
