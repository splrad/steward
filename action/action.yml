name: SPLRAD Steward
description: Run a versioned SPLRAD Steward operation.
author: SPLRAD
inputs:
  operation:
    description: Steward operation to execute.
    required: true
  github-token:
    description: Platform token used by GitHub-backed operations. Not used by version or the filesystem-only release-adapter.
    required: false
  mutation-token:
    description: Separate human token required only by governance-request-copilot and governance-auto-approve.
    required: false
  event-path:
    description: Path to the trusted GitHub event payload. Defaults to GITHUB_EVENT_PATH.
    required: false
  pr-number:
    description: Pull request number for a manual dispatch when the event has no native PR association.
    required: false
  head-sha:
    description: Expected current PR head SHA for a manual dispatch or relay signal.
    required: false
  request-result:
    description: Result of the Copilot review request job for governance-copilot.
    required: false
  matrix-mode:
    description: "Matrix behavior: observe, repair, or enforce."
    required: false
    default: enforce
  matrix-scope:
    description: "Matrix target scope: auto, full, or gate-only."
    required: false
    default: auto
  release-adapter-command:
    description: Trusted default-branch Manifest adapterCommand encoded as a JSON string array. Used only by release-adapter.
    required: false
  release-context:
    description: Steward-generated Release adapter context JSON. Used by Release operations after preflight.
    required: false
  release-workspace:
    description: Checked-out consumer repository root. Defaults to GITHUB_WORKSPACE. Used only by release-adapter.
    required: false
  release-adapter-phase:
    description: "Release adapter phase: plan or build. Required by release-adapter."
    required: false
  release-plan:
    description: Validated Release plan JSON. Used by Steward-owned publication operations.
    required: false
  release-assets:
    description: Validated Release assets manifest JSON produced by the build phase.
    required: false
  release-output-directory:
    description: Isolated directory containing validated Release assets.
    required: false
outputs:
  steward-version:
    description: Version of the bundled Steward Action.
  state:
    description: passed, pending, failed, or ignored operation state.
  operation-result:
    description: JSON result for step summaries and workflow orchestration.
  governance-enabled:
    description: Whether default-branch Manifest governance is enabled.
  copilot-review-enabled:
    description: Whether default-branch Manifest Copilot review is enabled.
  release-plan:
    description: Validated Release plan JSON produced by release-adapter.
  release-assets:
    description: Validated Release assets manifest JSON produced by release-adapter.
  release-output-directory:
    description: Absolute directory containing validated Release assets.
  release-needed:
    description: Whether the trusted merged pull request matches Release trigger paths.
  release-trigger:
    description: Validated Release trigger decision JSON produced by release-preflight.
  release-context:
    description: Validated Release adapter context JSON produced by release-preflight.
  release-runner:
    description: Trusted default-branch Manifest runner produced by release-preflight.
  release-adapter-command:
    description: Trusted default-branch Manifest adapter command JSON produced by release-preflight.
  release-build-needed:
    description: Whether no existing tag or Release blocks the build phase.
  release-publication:
    description: Validated tag and Release publication decision JSON.
  release-url:
    description: Published or already-existing Release URL.
runs:
  using: node24
  main: dist/index.js
branding:
  icon: shield
  color: blue
